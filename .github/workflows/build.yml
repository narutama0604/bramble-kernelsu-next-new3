name: Build Pixel 4a 5G KernelSU Next

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm clang libssl-dev libelf-dev libarchive-tools

      - name: Setup Proton Clang
        run: |
          # Proton Clangをclone (wgetより確実です)
          git clone --depth 1 https://github.com/kdrag0n/proton-clang.git $GITHUB_WORKSPACE/proton-clang

      - name: Fetch Kernel Source
        run: |
          # LineageOSのソースを取得 (ブランチ名は適宜調整してください)
          git clone --depth 1 https://github.com/LineageOS/android_kernel_google_redbull.git -b lineage-21 kernel-source

      - name: Setup KernelSU Next
        run: |
          cd kernel-source
          # KernelSU Nextのインストール
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/main/kernel/setup.sh" | bash -s main
          
          # defconfigに設定を追加
          echo "CONFIG_KSU=y" >> arch/arm64/configs/redbull_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/redbull_defconfig

      - name: Build Kernel
        run: |
          cd kernel-source
          # パス設定
          export PATH=$GITHUB_WORKSPACE/proton-clang/bin:$PATH
          
          # コンパイル引数
          make -j$(nproc --all) O=out \
               ARCH=arm64 \
               CC=clang \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
               LLVM=1 \
               redbull_defconfig

          make -j$(nproc --all) O=out \
               ARCH=arm64 \
               CC=clang \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
               LLVM=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-bramble-ksun
          path: |
            kernel-source/out/arch/arm64/boot/Image.lz4
            kernel-source/out/arch/arm64/boot/dtbo.img
