name: Build Pixel 4a 5G KernelSU Next

on:
  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm clang libssl-dev libelf-dev

      - name: Setup Toolchain
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain
          cd $GITHUB_WORKSPACE/toolchain
          # AOSPのClangを使用するのが最も安定します
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r487747c.tar.gz
          tar -xf clang-r487747c.tar.gz

      - name: Fetch Kernel Source
        run: |
          # LineageOSのredbullカーネルを取得
          git clone https://github.com/LineageOS/android_kernel_google_redbull.git -b lineage-21 kernel-source
          # ※ LineageOS 23.2が存在する場合は上記ブランチ名を変更してください

      - name: Setup KernelSU Next
        run: |
          cd kernel-source
          # KernelSU Nextのインストールスクリプトを実行
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/main/kernel/setup.sh" | bash -s main
          
          # 設定の有効化
          echo "CONFIG_KSU=y" >> arch/arm64/configs/redbull_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/redbull_defconfig

      - name: Build Kernel
        run: |
          cd kernel-source
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-

          make O=out redbull_defconfig
          make -j$(nproc --all) O=out

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-bramble-ksun
          path: kernel-source/out/arch/arm64/boot/Image.lz4
