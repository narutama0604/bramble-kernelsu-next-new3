name: Build Pixel 4a 5G KernelSU Next
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Kernel
        uses: reiryuki/Github-Action-Android-Kernel-Builder@master
        with:
          # LineageOS 23.2 のソース (msm-4.19)
          kernel_url: https://github.com/LineageOS/android_kernel_google_msm-4.19
          kernel_branch: lineage-23.2
          config: b3_b4_defconfig
          arch: arm64
          
          # コンパイラ設定
          clang_url: https://googlesource.com/external/github.com/soong-blobs/clang-prebuilts-gcc-arm64-linux-x86
          # LineageOS 23.2 (Android 16相当) の場合は、より新しいClangが必要になる場合があります
          
          # KernelSU Next の導入オプション
          # このアクションはカスタムスクリプトを実行できるため、そこで導入します
          extra_commands: |
            # KernelSU Next のインストール (Non-GKI 4.19向け)
            curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/main/kernel/setup.sh" | bash -s main
            
            # GSI/KernelSUに必要な設定を追記
            echo "CONFIG_KPROBES=y" >> arch/arm64/configs/b3_b4_defconfig
            echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/b3_b4_defconfig
            echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/b3_b4_defconfig
