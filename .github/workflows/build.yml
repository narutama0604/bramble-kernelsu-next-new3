name: Build KernelSU Next for Pixel 4a 5G
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 空き容量の確保
        run: |
          sudo rm -rf /usr/share/dotnet /etc/mysql /var/lib/mysql /usr/local/lib/android
          sudo apt update && sudo apt install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm git curl zip

      - name: ソースの取得
        run: |
          # 1. カーネルソースの取得
          git clone --depth=1 https://github.com/LineageOS/android_kernel_google_redbull -b lineage-21 kernel-source
          
          # 2. KernelSU Next の取得 (リポジトリ名を kernelsu-next に固定)
          cd kernel-source
          git clone https://github.com/rifsxd/KernelSU-Next drivers/kernelsu-next
          
          # 3. Kconfig と Makefile の書き換え (エラー防止のためパスを再確認)
          if [ -f "drivers/kernelsu-next/Kconfig" ]; then
            echo "KernelSU-Next source found."
            # Kconfig の末尾 (endmenu の前) に追加
            sed -i '/endmenu/i source "drivers/kernelsu-next/Kconfig"' drivers/Kconfig
            # Makefile に追加
            echo 'obj-y += kernelsu-next/' >> drivers/Makefile
          else
            echo "Error: KernelSU-Next source NOT found!"
            exit 1
          fi
          
          # 4. コンフィグに KernelSU を有効化
          CONF="arch/arm64/configs/vendor/redbull_defconfig"
          if [ -f "$CONF" ]; then
            echo "CONFIG_KSU=y" >> "$CONF"
            echo "CONFIG_KSU_NEXT_RENAME_UNTRUSTED_APP=y" >> "$CONF"
          else
            find arch/arm64/configs/ -name "*defconfig" -exec sh -c 'echo "CONFIG_KSU=y" >> "$1"' -- {} \;
          fi

      - name: ツールチェーンの取得
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b main clang-repo
          mkdir clang
          CLANG_DIR=$(ls -d clang-repo/clang-r* | head -n 1)
          cp -r $CLANG_DIR/* clang/

      - name: ビルド実行
        run: |
          cd kernel-source
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          
          # ビルド引数
          MAKE_ARGS="ARCH=arm64 \
                     O=out \
                     CC=clang \
                     LD=ld.lld \
                     AR=llvm-ar \
                     NM=llvm-nm \
                     OBJCOPY=llvm-objcopy \
                     OBJDUMP=llvm-objdump \
                     STRIP=llvm-strip \
                     CROSS_COMPILE=aarch64-linux-gnu- \
                     CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                     CLANG_TRIPLE=aarch64-linux-gnu-"

          # 構成の生成
          make $MAKE_ARGS vendor/redbull_defconfig
          
          # 実際のコンパイル
          make -j$(nproc --all) $MAKE_ARGS

      - name: 成果物のパッケージング (AnyKernel3)
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          rm -rf AnyKernel3/.git
          if ls kernel-source/out/arch/arm64/boot/Image* 1> /dev/null 2>&1; then
            cp kernel-source/out/arch/arm64/boot/Image* AnyKernel3/
          else
            echo "Kernel image NOT found!"
            exit 1
          fi
          cd AnyKernel3
          sed -i 's/device.name1=maguro/device.name1=bramble/g' anykernel.sh
          sed -i 's/device.name2=toro/device.name2=redfin/g' anykernel.sh
          zip -r ../ksu-next-kernel.zip *

      - name: 成果物のアップロード
        uses: actions/upload-artifact@v4
        with:
          name: ksu-next-kernel-zip
          path: ksu-next-kernel.zip
