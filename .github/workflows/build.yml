name: Build Bramble KernelSU Next
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Kernel
        uses: daboynb/Android-Kernel-Build-Action@main
        with:
          # LineageOS 23.2 のソース（デバイスによりURLが異なる場合があります）
          kernel-url: https://github.com/LineageOS/android_kernel_google_msm-4.19
          kernel-branch: lineage-23.2
          
          # Pixel 4a 5G (bramble) の標準設定ファイル
          kernel-config: b3_b4_defconfig
          
          arch: arm64
          # Pixel 4a 5G のカーネルイメージ名は通常 Image.gz
          kernel-name: Image.gz
          
          # コンパイラ設定 (LineageOS 23.2は最新のClangが必要)
          enable-clang: true
          use-aosp-clang: true
          # master-kernel-build-2024 等、ビルド時期に合わせたブランチを指定
          aosp-clang-branch: master-kernel-build-2024
          
          # KernelSU Next の統合
          enable-kernelsu: true
          kernelsu-variant: next
          # 必要に応じて特定のバージョンを指定
          kernelsu-version: main

          # GSI用 (Non-GKI 4.19カーネル) のための追加オプション
          # 必要に応じて KPROBES 等を有効化するスクリプトを記述可能
          extra-cmd: |
            echo "CONFIG_KPROBES=y" >> arch/arm64/configs/b3_b4_defconfig
            echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/b3_b4_defconfig
